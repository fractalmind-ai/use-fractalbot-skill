name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Required files exist
        run: |
          test -f SKILL.md
          test -f README.md

      - name: Validate skill front matter
        run: |
          head -n 1 SKILL.md | grep -q '^---$'
